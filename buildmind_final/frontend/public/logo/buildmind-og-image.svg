<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="node-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#A78BFA" stroke-width="0.5">
    <line x1="0"    y1="90"  x2="1200" y2="90"/>
    <line x1="0"    y1="180" x2="1200" y2="180"/>
    <line x1="0"    y1="270" x2="1200" y2="270"/>
    <line x1="0"    y1="360" x2="1200" y2="360"/>
    <line x1="0"    y1="450" x2="1200" y2="450"/>
    <line x1="0"    y1="540" x2="1200" y2="540"/>
    <line x1="100"  y1="0"   x2="100"  y2="630"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="300"  y1="0"   x2="300"  y2="630"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="500"  y1="0"   x2="500"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="700"  y1="0"   x2="700"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
    <line x1="900"  y1="0"   x2="900"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
    <line x1="1100" y1="0"   x2="1100" y2="630"/>
  </g>

  <!-- Glow halo behind logo -->
  <ellipse cx="600" cy="280" rx="300" ry="200" fill="url(#purple-glow)"/>

  <!-- Large neural net illustration (centered, large) -->
  <!-- Left col: x=480, y spacing=80 -->
  <circle cx="480" cy="180" r="10" fill="#3B30B0" opacity="0.8"/>
  <circle cx="480" cy="280" r="10" fill="#3B30B0" opacity="0.8"/>
  <circle cx="480" cy="380" r="10" fill="#3B30B0" opacity="0.8"/>

  <!-- Mid col: x=600, y spacing 70 -->
  <circle cx="600" cy="140" r="10" fill="#5B21B6" opacity="0.8"/>
  <circle cx="600" cy="220" r="10" fill="#5B21B6" opacity="0.8"/>
  <circle cx="600" cy="300" r="10" fill="#5B21B6" opacity="0.8"/>
  <circle cx="600" cy="380" r="10" fill="#5B21B6" opacity="0.8"/>
  <circle cx="600" cy="460" r="10" fill="#5B21B6" opacity="0.6"/>

  <!-- Right col: x=720 -->
  <circle cx="720" cy="180" r="10" fill="#7C3AED" opacity="0.8"/>
  <circle cx="720" cy="280" r="10" fill="#7C3AED" opacity="0.8"/>
  <circle cx="720" cy="380" r="10" fill="#7C3AED" opacity="0.8"/>

  <!-- Connections left→mid (dim) -->
  <line x1="490" y1="180" x2="590" y2="140" stroke="rgba(99,91,255,0.2)"  stroke-width="1.2"/>
  <line x1="490" y1="180" x2="590" y2="220" stroke="rgba(99,91,255,0.25)" stroke-width="1.2"/>
  <line x1="490" y1="280" x2="590" y2="220" stroke="rgba(99,91,255,0.4)"  stroke-width="1.5"/>
  <line x1="490" y1="280" x2="590" y2="300" stroke="rgba(99,91,255,0.4)"  stroke-width="1.5"/>
  <line x1="490" y1="380" x2="590" y2="300" stroke="rgba(99,91,255,0.2)"  stroke-width="1.2"/>
  <line x1="490" y1="380" x2="590" y2="380" stroke="rgba(99,91,255,0.2)"  stroke-width="1.2"/>
  <line x1="490" y1="380" x2="590" y2="460" stroke="rgba(99,91,255,0.15)" stroke-width="1"/>

  <!-- Connections mid→right (dim) -->
  <line x1="610" y1="140" x2="710" y2="180" stroke="rgba(139,92,246,0.2)"  stroke-width="1.2"/>
  <line x1="610" y1="220" x2="710" y2="180" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <line x1="610" y1="220" x2="710" y2="280" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <line x1="610" y1="300" x2="710" y2="280" stroke="rgba(139,92,246,0.25)" stroke-width="1.2"/>
  <line x1="610" y1="300" x2="710" y2="380" stroke="rgba(139,92,246,0.2)"  stroke-width="1.2"/>
  <line x1="610" y1="380" x2="710" y2="380" stroke="rgba(139,92,246,0.2)"  stroke-width="1.2"/>
  <line x1="610" y1="460" x2="710" y2="380" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>

  <!-- ACTIVE PATH — bright highlighted signal -->
  <line x1="490" y1="280" x2="590" y2="220" stroke="#6D28D9" stroke-width="3" opacity="0.9"/>
  <line x1="610" y1="220" x2="710" y2="280" stroke="#8B5CF6" stroke-width="3" opacity="0.9"/>

  <!-- Active node glows -->
  <circle cx="480" cy="280" r="14" fill="#4F46E5" filter="url(#glow-lg)"/>
  <circle cx="600" cy="220" r="16" fill="#7C3AED" filter="url(#glow-lg)"/>
  <circle cx="720" cy="280" r="14" fill="#A78BFA" filter="url(#glow-lg)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>

  <!-- Logo mark (top-left) -->
  <rect x="80" y="64" width="52" height="52" rx="12" fill="#0A0A0C"/>
  <rect x="80" y="64" width="52" height="52" rx="12" fill="none" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <!-- mini neural net in logo mark -->
  <circle cx="90"  cy="79"  r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="90"  cy="90"  r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="90"  cy="101" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="106" cy="75"  r="3" fill="#7C3AED" opacity="0.9"/>
  <circle cx="106" cy="86"  r="3" fill="#7C3AED" opacity="0.9"/>
  <circle cx="106" cy="97"  r="3" fill="#7C3AED" opacity="0.9"/>
  <circle cx="106" cy="107" r="3" fill="#7C3AED" opacity="0.7"/>
  <circle cx="122" cy="79"  r="3" fill="#A78BFA" opacity="0.8"/>
  <circle cx="122" cy="90"  r="3" fill="#A78BFA" opacity="0.8"/>
  <circle cx="122" cy="101" r="3" fill="#A78BFA" opacity="0.8"/>
  <line x1="93" y1="90" x2="103" y2="86" stroke="#7C3AED" stroke-width="1.5" opacity="0.9"/>
  <line x1="109" y1="86" x2="119" y2="90" stroke="#8B5CF6" stroke-width="1.5" opacity="0.9"/>
  <circle cx="106" cy="86" r="4" fill="#A78BFA" filter="url(#glow-sm)"/>

  <!-- Wordmark -->
  <text x="148" y="100"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#FAFAFA">BuildMind</text>

  <!-- Tagline -->
  <text x="80" y="170"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="0.06em"
    fill="#71717A"
    text-transform="uppercase">FOUNDER OS</text>

  <!-- Main headline -->
  <text x="80" y="530"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#FAFAFA">Stop guessing.</text>
  <text x="80" y="594"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#A78BFA">Build with clarity.</text>
</svg>
