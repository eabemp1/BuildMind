<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="f-node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="f-glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#09090B"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(139,92,246,0.4)" stroke-width="0.8"/>

  <!-- 3-layer neural net compressed -->
  <!-- Left col -->
  <circle cx="6"  cy="9"  r="1.6" fill="#4F46E5" opacity="0.75"/>
  <circle cx="6"  cy="16" r="1.6" fill="#4F46E5" opacity="0.75"/>
  <circle cx="6"  cy="23" r="1.6" fill="#4F46E5" opacity="0.75"/>
  <!-- Mid col -->
  <circle cx="16" cy="7"  r="1.6" fill="#7C3AED" opacity="0.8"/>
  <circle cx="16" cy="14" r="1.6" fill="#7C3AED" opacity="0.8"/>
  <circle cx="16" cy="21" r="1.6" fill="#7C3AED" opacity="0.8"/>
  <circle cx="16" cy="26" r="1.6" fill="#7C3AED" opacity="0.6"/>
  <!-- Right col -->
  <circle cx="26" cy="9"  r="1.6" fill="#A78BFA" opacity="0.75"/>
  <circle cx="26" cy="16" r="1.6" fill="#A78BFA" opacity="0.75"/>
  <circle cx="26" cy="23" r="1.6" fill="#A78BFA" opacity="0.75"/>

  <!-- Connections dimmed -->
  <line x1="7.6"  y1="9"  x2="14.4" y2="7"  stroke="rgba(99,91,255,0.28)"  stroke-width="0.5"/>
  <line x1="7.6"  y1="9"  x2="14.4" y2="14" stroke="rgba(99,91,255,0.35)"  stroke-width="0.5"/>
  <line x1="7.6"  y1="16" x2="14.4" y2="14" stroke="rgba(99,91,255,0.5)"   stroke-width="0.7"/>
  <line x1="7.6"  y1="16" x2="14.4" y2="21" stroke="rgba(99,91,255,0.35)"  stroke-width="0.5"/>
  <line x1="7.6"  y1="23" x2="14.4" y2="21" stroke="rgba(99,91,255,0.28)"  stroke-width="0.5"/>
  <line x1="7.6"  y1="23" x2="14.4" y2="26" stroke="rgba(99,91,255,0.2)"   stroke-width="0.5"/>
  <line x1="17.6" y1="7"  x2="24.4" y2="9"  stroke="rgba(167,139,250,0.28)" stroke-width="0.5"/>
  <line x1="17.6" y1="14" x2="24.4" y2="9"  stroke="rgba(167,139,250,0.45)" stroke-width="0.7"/>
  <line x1="17.6" y1="14" x2="24.4" y2="16" stroke="rgba(167,139,250,0.65)" stroke-width="1"/>
  <line x1="17.6" y1="21" x2="24.4" y2="16" stroke="rgba(167,139,250,0.3)"  stroke-width="0.5"/>
  <line x1="17.6" y1="21" x2="24.4" y2="23" stroke="rgba(167,139,250,0.28)" stroke-width="0.5"/>
  <line x1="17.6" y1="26" x2="24.4" y2="23" stroke="rgba(167,139,250,0.2)"  stroke-width="0.5"/>

  <!-- Bright active path -->
  <line x1="7.6"  y1="16" x2="14.4" y2="14" stroke="#6D28D9" stroke-width="1" opacity="0.95"/>
  <line x1="17.6" y1="14" x2="24.4" y2="16" stroke="#8B5CF6" stroke-width="1" opacity="0.95"/>

  <!-- Glowing active nodes -->
  <circle cx="6"  cy="16" r="2.2" fill="url(#f-node)" filter="url(#f-glow)"/>
  <circle cx="16" cy="14" r="2.4" fill="#A78BFA"       filter="url(#f-glow)"/>
  <circle cx="26" cy="16" r="2.2" fill="#C4B5FD"       filter="url(#f-glow)"/>
</svg>
