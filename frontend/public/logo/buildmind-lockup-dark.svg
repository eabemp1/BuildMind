<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40">
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="node-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="text-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E4E4E7"/>
      <stop offset="100%" stop-color="#A1A1AA"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="4" width="32" height="32" rx="7" fill="#09090B"/>
  <rect x="0" y="4" width="32" height="32" rx="7" fill="none" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>

  <!-- Neural net: 3 left, 3 mid, 3 right — tiny version -->
  <!-- Left -->
  <circle cx="7"  cy="13" r="1.8" fill="#4F46E5" opacity="0.7"/>
  <circle cx="7"  cy="20" r="1.8" fill="#4F46E5" opacity="0.7"/>
  <circle cx="7"  cy="27" r="1.8" fill="#4F46E5" opacity="0.7"/>
  <!-- Mid -->
  <circle cx="16" cy="11" r="1.8" fill="#7C3AED" opacity="0.7"/>
  <circle cx="16" cy="18" r="1.8" fill="#7C3AED" opacity="0.7"/>
  <circle cx="16" cy="25" r="1.8" fill="#7C3AED" opacity="0.7"/>
  <circle cx="16" cy="31" r="1.8" fill="#7C3AED" opacity="0.6"/>
  <!-- Right -->
  <circle cx="25" cy="13" r="1.8" fill="#A78BFA" opacity="0.7"/>
  <circle cx="25" cy="20" r="1.8" fill="#A78BFA" opacity="0.7"/>
  <circle cx="25" cy="27" r="1.8" fill="#A78BFA" opacity="0.7"/>

  <!-- Connections -->
  <line x1="8.8"  y1="13" x2="14.2" y2="11" stroke="rgba(99,91,255,0.3)"   stroke-width="0.6"/>
  <line x1="8.8"  y1="13" x2="14.2" y2="18" stroke="rgba(99,91,255,0.4)"   stroke-width="0.6"/>
  <line x1="8.8"  y1="20" x2="14.2" y2="18" stroke="rgba(99,91,255,0.55)"  stroke-width="0.8"/>
  <line x1="8.8"  y1="20" x2="14.2" y2="25" stroke="rgba(99,91,255,0.4)"   stroke-width="0.6"/>
  <line x1="8.8"  y1="27" x2="14.2" y2="25" stroke="rgba(99,91,255,0.3)"   stroke-width="0.6"/>
  <line x1="8.8"  y1="27" x2="14.2" y2="31" stroke="rgba(99,91,255,0.25)"  stroke-width="0.6"/>

  <line x1="17.8" y1="11" x2="23.2" y2="13" stroke="rgba(167,139,250,0.3)"  stroke-width="0.6"/>
  <line x1="17.8" y1="18" x2="23.2" y2="13" stroke="rgba(167,139,250,0.55)" stroke-width="0.8"/>
  <line x1="17.8" y1="18" x2="23.2" y2="20" stroke="rgba(167,139,250,0.7)"  stroke-width="1.2"/>
  <line x1="17.8" y1="25" x2="23.2" y2="20" stroke="rgba(167,139,250,0.35)" stroke-width="0.6"/>
  <line x1="17.8" y1="25" x2="23.2" y2="27" stroke="rgba(167,139,250,0.3)"  stroke-width="0.6"/>
  <line x1="17.8" y1="31" x2="23.2" y2="27" stroke="rgba(167,139,250,0.25)" stroke-width="0.6"/>

  <!-- Active path highlight -->
  <line x1="8.8"  y1="20" x2="14.2" y2="18" stroke="#6D28D9" stroke-width="1" opacity="0.9"/>
  <line x1="17.8" y1="18" x2="23.2" y2="20" stroke="#8B5CF6" stroke-width="1" opacity="0.9"/>

  <!-- Active node glow -->
  <circle cx="16" cy="18" r="2.2" fill="#A78BFA" filter="url(#glow2)"/>
  <circle cx="7"  cy="20" r="2"   fill="url(#node-g)"/>
  <circle cx="25" cy="20" r="2"   fill="#C4B5FD"/>

  <!-- Wordmark -->
  <text x="41" y="25.5"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="17"
    font-weight="600"
    letter-spacing="-0.4"
    fill="#FAFAFA">BuildMind</text>
</svg>
