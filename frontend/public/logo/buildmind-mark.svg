<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="b-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>
  
  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>

  <!-- Neural network nodes + connections -->
  <!-- Left column nodes -->
  <circle cx="14" cy="22" r="3.5" fill="#4F46E5" opacity="0.7"/>
  <circle cx="14" cy="32" r="3.5" fill="#4F46E5" opacity="0.7"/>
  <circle cx="14" cy="42" r="3.5" fill="#4F46E5" opacity="0.7"/>

  <!-- Middle column nodes -->
  <circle cx="32" cy="16" r="3.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="32" cy="27" r="3.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="32" cy="38" r="3.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="32" cy="49" r="3.5" fill="#7C3AED" opacity="0.8"/>

  <!-- Right column nodes -->
  <circle cx="50" cy="22" r="3.5" fill="#A78BFA" opacity="0.7"/>
  <circle cx="50" cy="32" r="3.5" fill="#A78BFA" opacity="0.7"/>
  <circle cx="50" cy="42" r="3.5" fill="#A78BFA" opacity="0.7"/>

  <!-- Connections left to middle -->
  <line x1="17.5" y1="22" x2="28.5" y2="16" stroke="rgba(99,91,255,0.35)" stroke-width="0.8"/>
  <line x1="17.5" y1="22" x2="28.5" y2="27" stroke="rgba(99,91,255,0.35)" stroke-width="0.8"/>
  <line x1="17.5" y1="32" x2="28.5" y2="27" stroke="rgba(99,91,255,0.5)" stroke-width="0.8"/>
  <line x1="17.5" y1="32" x2="28.5" y2="38" stroke="rgba(99,91,255,0.5)" stroke-width="0.8"/>
  <line x1="17.5" y1="42" x2="28.5" y2="38" stroke="rgba(99,91,255,0.35)" stroke-width="0.8"/>
  <line x1="17.5" y1="42" x2="28.5" y2="49" stroke="rgba(99,91,255,0.35)" stroke-width="0.8"/>
  
  <!-- Connections middle to right - highlighted active paths -->
  <line x1="35.5" y1="16" x2="46.5" y2="22" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <line x1="35.5" y1="27" x2="46.5" y2="22" stroke="rgba(167,139,250,0.55)" stroke-width="1.2"/>
  <line x1="35.5" y1="27" x2="46.5" y2="32" stroke="rgba(167,139,250,0.55)" stroke-width="1.2"/>
  <line x1="35.5" y1="38" x2="46.5" y2="32" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <line x1="35.5" y1="38" x2="46.5" y2="42" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>
  <line x1="35.5" y1="49" x2="46.5" y2="42" stroke="rgba(167,139,250,0.3)" stroke-width="0.8"/>

  <!-- Highlighted "active path" (the daily action) -->
  <line x1="17.5" y1="32" x2="28.5" y2="27" stroke="#7C3AED" stroke-width="1.5" opacity="0.9"/>
  <line x1="35.5" y1="27" x2="46.5" y2="32" stroke="#A78BFA" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Active nodes glow -->
  <circle cx="14" cy="32" r="3.5" fill="url(#node-grad)" filter="url(#glow)"/>
  <circle cx="32" cy="27" r="4" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="50" cy="32" r="3.5" fill="#C4B5FD" filter="url(#glow)"/>
</svg>
